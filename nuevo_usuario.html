<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestión de usuario - Inmobiliaria PNK.">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <title>Inmobiliaria PNK - Gestión Usuario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <script src="js/dark-mode.js"></script>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-card bg-white p-5 rounded-4 shadow-sm border-0">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div>
                        <h2 class="fw-bold mb-0" id="pageTitle">Nuevo Usuario</h2>
                        <p class="text-muted" id="pageSubtitle">Crear perfil de acceso al sistema.</p>
                    </div>
                    <a href="mantenedor_usuarios.html" class="btn btn-outline-secondary rounded-pill px-4">
                        <i class="fas fa-times me-2"></i> Cancelar
                    </a>
                </div>

                <form id="formUsuario">
                    <input type="hidden" id="userId" value="">

                    <div class="row g-4">
                        <!-- Identificación -->
                        <div class="col-md-12">
                            <h5 class="fw-bold border-bottom pb-2">Información Personal</h5>
                        </div>
                        <div class="col-md-7">
                            <label class="form-label fw-bold">Nombre Completo</label>
                            <input type="text" class="form-control" id="userName" placeholder="Ej: Pedro Soto" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label fw-bold">RUT</label>
                            <input type="text" class="form-control" id="userRut" placeholder="12.345.678-9" required>
                        </div>

                        <!-- Contacto -->
                        <div class="col-md-7">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" id="userEmail" placeholder="correo@ejemplo.com" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label fw-bold">Teléfono</label>
                            <input type="tel" class="form-control" id="userPhone" placeholder="+56 9 1234 5678">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Fecha de Nacimiento</label>
                            <input type="date" class="form-control" id="userBirthdate" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Sexo</label>
                            <select class="form-select" id="userSex" required>
                                <option value="" selected disabled>Seleccionar...</option>
                                <option value="M">Masculino</option>
                                <option value="F">Femenino</option>
                                <option value="O">Otro</option>
                            </select>
                        </div>

                        <!-- Sistema -->
                        <div class="col-md-12 mt-4">
                            <h5 class="fw-bold border-bottom pb-2">Configuración de Acceso</h5>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-success">Rol Asignado</label>
                            <select class="form-select border-success" id="userRole">
                                <option>Dueño de Inmueble (Propietario)</option>
                                <option>Gestor Inmobiliario Free</option>
                                <option>Usuario Normal (Cliente)</option>
                                <option>Administrador</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" class="form-control" id="userPassword" placeholder="Clave de acceso">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Estado de Cuenta</label>
                            <div class="form-check form-switch mt-2">
                                <input class="form-check-input" type="checkbox" checked id="statusSwitch">
                                <label class="form-check-label" for="statusSwitch">Cuenta Activa / Habilitada</label>
                            </div>
                        </div>

                        <div class="col-12 mt-5">
                            <button type="submit" class="btn btn-success btn-lg px-5 rounded-pill fw-bold">
                                <i class="fas fa-user-check me-2"></i> Guardar Usuario
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/utils.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/crud-usuarios.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        PNK.protectRoute(['admin']);
        PNK.showUserInfo();
        PNK.setupLogout();
    });
</script>
</body>
</html>

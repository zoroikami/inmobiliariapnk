<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Detalle de propiedad - Inmobiliaria PNK.">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <title>Inmobiliaria PNK - Detalle Propiedad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/detalle.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <script src="js/dark-mode.js"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="bg-light">

    <!-- Botón volver -->
    <a href="index.html" class="detail-back-btn" id="backBtn">
        <i class="fas fa-arrow-left"></i>
    </a>

    <!-- Dark mode toggle flotante -->
    <div style="position: fixed; top: 20px; right: 20px; z-index: 100;">
        <button class="dark-mode-toggle" title="Cambiar tema">
            <i class="fas fa-moon icon-moon"></i>
            <i class="fas fa-sun icon-sun"></i>
        </button>
    </div>

    <!-- Hero Image -->
    <div class="detail-hero" id="heroSection">
        <img id="heroImg" src="img/hero.png" alt="Propiedad">
        <div class="detail-hero-overlay">
            <div class="detail-hero-info">
                <span class="detail-badge-operation detail-badge-venta mb-3" id="heroBadge">Venta</span>
                <h1 id="heroTitle">Cargando...</h1>
                <p class="detail-location"><i class="fas fa-map-marker-alt me-2"></i><span id="heroLocation">-</span></p>
            </div>
        </div>
    </div>

    <div class="container py-5">
        <div class="row g-4">
            <!-- Columna principal -->
            <div class="col-lg-8">
                <!-- Precio -->
                <div class="detail-price-box mb-4">
                    <p class="price-operation" id="priceOperation">Precio de Venta</p>
                    <p class="price-main" id="priceMain">-</p>
                    <p class="price-secondary" id="priceSecondary">-</p>
                </div>

                <!-- Características -->
                <div class="detail-section">
                    <h3><i class="fas fa-list-ul me-2 text-success"></i>Características</h3>
                    <div class="detail-specs" id="specsGrid">
                        <!-- Renderizado por JS -->
                    </div>
                </div>

                <!-- Descripción -->
                <div class="detail-section">
                    <h3><i class="fas fa-align-left me-2 text-primary"></i>Descripción</h3>
                    <p class="detail-description" id="descriptionText">-</p>
                </div>

                <!-- Extras -->
                <div class="detail-section" id="extrasSection" style="display: none;">
                    <h3><i class="fas fa-plus-circle me-2 text-warning"></i>Extras y Comodidades</h3>
                    <div class="detail-extras" id="extrasGrid"></div>
                </div>

                <!-- Mapa -->
                <div class="detail-section">
                    <h3><i class="fas fa-map-marked-alt me-2 text-danger"></i>Ubicación</h3>
                    <div class="detail-map" id="detailMap"></div>
                    <p class="text-muted small mt-2" id="mapAddress"><i class="fas fa-map-pin me-1"></i> -</p>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="col-lg-4">
                <!-- Código y estado -->
                <div class="detail-section text-center mb-4">
                    <span class="badge bg-secondary fs-6 mb-2" id="propCode">PNK-000</span>
                    <br>
                    <span class="badge" id="propStatus">-</span>
                    <p class="text-muted small mt-2 mb-0"><i class="fas fa-calendar me-1"></i> Publicado: <span id="propDate">-</span></p>
                </div>

                <!-- Contactar -->
                <div class="detail-contact-form">
                    <h5 class="fw-bold mb-3"><i class="fas fa-headset me-2 text-success"></i>Contactar Gestor</h5>
                    <p class="text-muted small mb-3">Completa el formulario y te contactaremos.</p>
                    <form id="contactForm">
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Tu nombre completo" required>
                        </div>
                        <div class="mb-3">
                            <input type="tel" class="form-control" placeholder="+56 9 XXXX XXXX" required>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="tu@email.com" required>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" rows="3" placeholder="Me interesa esta propiedad..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100 rounded-pill fw-bold py-2">
                            <i class="fas fa-paper-plane me-2"></i> Enviar Consulta
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Propiedades Similares -->
        <div class="mt-5" id="similarSection" style="display: none;">
            <h3 class="fw-bold mb-4"><i class="fas fa-th-large me-2 text-success"></i>Propiedades Similares</h3>
            <div class="row g-4" id="similarGrid"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 small text-muted">&copy; 2026 Inmobiliaria PNK. Todos los derechos reservados.</p>
        </div>
    </footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/utils.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // ── Configurar back button inteligente ──────────────────
        var backBtn = document.getElementById('backBtn');
        if (backBtn) {
            backBtn.addEventListener('click', function(e) {
                e.preventDefault();
                // Si hay historial previo, volver atrás; si no, ir al dashboard del rol
                if (document.referrer && document.referrer.indexOf(window.location.host) !== -1) {
                    window.history.back();
                } else {
                    window.location.href = PNK.getDashboardUrl();
                }
            });
        }

        // Obtener ID de la URL
        var propId = PNK.getQueryParam('id');
        if (!propId) {
            window.location.href = PNK.getDashboardUrl();
            return;
        }

        PNK.api('propiedades.php?id=' + propId)
            .then(function(response) {
                if (!response.success || !response.propiedad) {
                    window.location.href = PNK.getDashboardUrl();
                    return;
                }
                var prop = response.propiedad;

                // ── Hero ─────────────────────────────────────────────
                document.title = 'Inmobiliaria PNK - ' + prop.titulo;
                document.getElementById('heroImg').src = prop.imagen || 'img/hero.png';
                document.getElementById('heroImg').alt = prop.titulo;
                document.getElementById('heroTitle').textContent = prop.titulo;
                document.getElementById('heroLocation').textContent = prop.direccion + ', ' + prop.comuna;

                var badge = document.getElementById('heroBadge');
                if (badge) {
                    badge.textContent = prop.operacion;
                    if (prop.operacion === 'Arriendo' || prop.operacion === 'Arriendo Temporada') {
                        badge.classList.remove('detail-badge-venta');
                        badge.classList.add('detail-badge-arriendo');
                    }
                }

                // ── Precio ───────────────────────────────────────────
                var opLabel = prop.operacion === 'Arriendo' ? 'Precio de Arriendo' : 
                              prop.operacion === 'Arriendo Temporada' ? 'Precio por Temporada' : 'Precio de Venta';
                document.getElementById('priceOperation').textContent = opLabel;
                
                if (prop.precioUF && prop.precioUF > 0) {
                    document.getElementById('priceMain').textContent = PNK.formatUF(prop.precioUF);
                    document.getElementById('priceSecondary').textContent = PNK.formatCLP(prop.precioCLP);
                } else {
                    document.getElementById('priceMain').textContent = PNK.formatCLP(prop.precioCLP);
                    document.getElementById('priceSecondary').textContent = '';
                }
                if (prop.operacion === 'Arriendo' && prop.precioUF) {
                    document.getElementById('priceSecondary').textContent += ' / mes';
                }

                // ── Specs Grid ───────────────────────────────────────
                var specs = [];
                specs.push({ icon: 'fa-home', value: prop.tipo, label: 'Tipo' });
                if (prop.dormitorios > 0) specs.push({ icon: 'fa-bed', value: prop.dormitorios, label: 'Dormitorios' });
                if (prop.banos > 0) specs.push({ icon: 'fa-bath', value: prop.banos, label: 'Baños' });
                if (prop.superficieTotal) specs.push({ icon: 'fa-ruler-combined', value: prop.superficieTotal + ' m²', label: 'Sup. Total' });
                if (prop.superficieConstruida) specs.push({ icon: 'fa-vector-square', value: prop.superficieConstruida + ' m²', label: 'Sup. Construida' });
                specs.push({ icon: 'fa-map-marker-alt', value: prop.comuna, label: 'Comuna' });

                var specsHtml = '';
                specs.forEach(function(s) {
                    specsHtml += '<div class="detail-spec animate__animated animate__fadeIn">';
                    specsHtml += '<i class="fas ' + s.icon + '"></i>';
                    specsHtml += '<span class="spec-value">' + s.value + '</span>';
                    specsHtml += '<span class="spec-label">' + s.label + '</span>';
                    specsHtml += '</div>';
                });
                document.getElementById('specsGrid').innerHTML = specsHtml;

                // ── Descripción ──────────────────────────────────────
                document.getElementById('descriptionText').textContent = prop.descripcion || 'Sin descripción disponible.';

                // ── Extras ───────────────────────────────────────────
                if (prop.extras && prop.extras.length > 0) {
                    document.getElementById('extrasSection').style.display = 'block';
                    var extrasIcons = {
                        'Estacionamiento': 'fa-car',
                        'Bodega': 'fa-warehouse',
                        'Piscina': 'fa-swimming-pool',
                        'Seguridad 24/7': 'fa-shield-alt',
                        'Logia': 'fa-door-open',
                        'Cocina Amoblada': 'fa-utensils',
                        'Antejardín': 'fa-leaf',
                        'Patio Trasero': 'fa-tree'
                    };

                    var extrasHtml = '';
                    prop.extras.forEach(function(extra) {
                        var icon = extrasIcons[extra] || 'fa-check';
                        extrasHtml += '<span class="detail-extra-tag"><i class="fas ' + icon + '"></i> ' + PNK.escapeHTML(extra) + '</span>';
                    });
                    document.getElementById('extrasGrid').innerHTML = extrasHtml;
                }

                // ── Código y Estado ──────────────────────────────────
                document.getElementById('propCode').textContent = prop.codigo || '-';
                var statusBadge = PNK.getStatusBadge(prop.estado);
                var statusEl = document.getElementById('propStatus');
                if (statusEl) {
                    statusEl.textContent = statusBadge.text;
                    statusEl.className = 'badge ' + statusBadge.class;
                }
                document.getElementById('propDate').textContent = PNK.formatDate(prop.fechaCreacion);

                // ── Mapa ─────────────────────────────────────────────
                if (prop.lat && prop.lng) {
                    var map = L.map('detailMap').setView([prop.lat, prop.lng], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap'
                    }).addTo(map);
                    L.marker([prop.lat, prop.lng]).addTo(map)
                        .bindPopup('<strong>' + PNK.escapeHTML(prop.titulo) + '</strong><br>' + PNK.escapeHTML(prop.direccion))
                        .openPopup();
                }
                document.getElementById('mapAddress').innerHTML = '<i class="fas fa-map-pin me-1"></i> ' + PNK.escapeHTML(prop.direccion);

                // ── Contact Form ─────────────────────────────────────
                var cForm = document.getElementById('contactForm');
                if (cForm) {
                    cForm.addEventListener('submit', function(e) {
                        e.preventDefault();
                        PNK.toast.success('¡Consulta enviada! Un gestor te contactará pronto (simulación).');
                        this.reset();
                    });
                }

                // ── Propiedades Similares ────────────────────────────
                PNK.api('propiedades.php?estado=publicado')
                    .then(function(simResponse) {
                        if (!simResponse.success || !simResponse.propiedades) return;
                        var similares = simResponse.propiedades.filter(function(p) {
                            return p.id !== prop.id && (p.comuna === prop.comuna || p.tipo === prop.tipo);
                        }).slice(0, 3);

                        if (similares.length > 0) {
                            document.getElementById('similarSection').style.display = 'block';
                            var simHtml = '';
                            similares.forEach(function(p) {
                                var precio = p.precioUF ? PNK.formatUF(p.precioUF) : PNK.formatCLP(p.precioCLP);
                                if (p.operacion === 'Arriendo') precio += ' / mes';
                                
                                simHtml += '<div class="col-md-4 animate__animated animate__fadeIn">';
                                simHtml += '<a href="detalle_propiedad.html?id=' + p.id + '" class="text-decoration-none">';
                                simHtml += '<div class="detail-similar-card">';
                                simHtml += '<img src="' + PNK.escapeHTML(p.imagen || 'img/prop1.png') + '" class="w-100" alt="' + PNK.escapeHTML(p.titulo) + '">';
                                simHtml += '<div class="p-3">';
                                simHtml += '<h6 class="fw-bold text-dark mb-1">' + PNK.escapeHTML(p.titulo) + '</h6>';
                                simHtml += '<p class="text-muted small mb-1"><i class="fas fa-map-marker-alt me-1"></i>' + PNK.escapeHTML(p.comuna) + '</p>';
                                simHtml += '<span class="fw-bold text-success">' + precio + '</span>';
                                simHtml += '</div></div></a></div>';
                            });
                            document.getElementById('similarGrid').innerHTML = simHtml;
                        }
                    })
                    .catch(function(err) {
                        console.error('Error cargando propiedades similares:', err);
                    });

            })
            .catch(function(error) {
                console.error('Error cargando propiedad:', error);
                window.location.href = PNK.getDashboardUrl();
            });
    });
</script>
</body>
</html>

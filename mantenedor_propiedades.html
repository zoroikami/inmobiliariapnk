<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestión de propiedades del catálogo Inmobiliaria PNK.">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <title>Inmobiliaria PNK - Mantenedor Propiedades</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <script src="js/dark-mode.js"></script>
</head>

<body>

    <div class="d-flex">
        <aside class="sidebar">
            <div class="profile">
                <div class="avatar" id="sidebarAvatar"><i class="fas fa-user-shield"></i></div>
                <h3>Administrador</h3>
                <p>admin@pnk.cl</p>
            </div>
            <nav id="sidebarLinks">
                <!-- Carga dinámica por rol -->
            </nav>
        </aside>

        <main class="main">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <div>
                        <h2>Mantenedor de Propiedades</h2>
                        <p class="text-muted mb-0">Gestión de cartera de inmuebles — <span id="propiedadesCount" class="fw-bold text-success">0 propiedad(es)</span></p>
                    </div>
                    <a href="nueva_propiedad.html" class="btn btn-success rounded-pill px-4 fw-bold shadow-sm">
                        <i class="fas fa-plus me-2"></i> Nueva Propiedad
                    </a>
                </div>

            <!-- Barra de búsqueda y exportar -->
            <div class="mb-4 mt-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div class="input-group" style="max-width: 400px;">
                    <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" class="form-control" id="searchPropiedades" placeholder="Buscar por nombre, código, ubicación...">
                </div>
                <div class="export-btn-group">
                    <button class="export-btn export-btn-csv" onclick="PNK.export.toCSV('table', 'propiedades_pnk')">
                        <i class="fas fa-file-csv"></i> Exportar CSV
                    </button>
                    <button class="export-btn export-btn-pdf" onclick="PNK.export.toPDF('table', 'Reporte de Propiedades')">
                        <i class="fas fa-file-pdf"></i> Exportar PDF
                    </button>
                </div>
            </div>

            <div class="table-container animate__animated animate__fadeIn">
                <h3 class="mb-4">Inventario de Propiedades</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Código</th>
                            <th>Propiedad / Tipo</th>
                            <th>Ubicación</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="propiedadesTableBody">
                        <!-- Renderizado dinámicamente por JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/utils.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/crud-propiedades.js"></script>
<script src="js/export.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var session = PNK.protectRoute(['admin', 'gestor']);
        PNK.showUserInfo();
        PNK.setupLogout();

        if (session) {
            // Configurar avatar y links de la barra lateral según rol
            var avatarEl = document.getElementById('sidebarAvatar');
            if (avatarEl) {
                avatarEl.innerHTML = session.rol === 'admin' ? '<i class="fas fa-user-shield"></i>' : '<i class="fas fa-user-tie"></i>';
            }

            var nav = document.getElementById('sidebarLinks');
            if (nav) {
                var links = '';
                if (session.rol === 'admin') {
                    links += '<a href="dashboard_admin.html"><i class="fas fa-th-large"></i> Dashboard</a>';
                    links += '<a href="mantenedor_usuarios.html"><i class="fas fa-users"></i> Mantene. Usuarios</a>';
                    links += '<a href="mantenedor_propiedades.html" class="active"><i class="fas fa-building"></i> Mantene. Propiedades</a>';
                } else {
                    links += '<a href="dashboard_gestor.html"><i class="fas fa-th-large"></i> Dashboard</a>';
                    links += '<a href="mantenedor_propiedades.html" class="active"><i class="fas fa-building"></i> Mis Propiedades</a>';
                }
                links += '<a href="mensajes.html"><i class="fas fa-comments"></i> Mensajes</a>';
                links += '<a href="agenda_visitas.html"><i class="fas fa-calendar-check"></i> Agenda Visitas</a>';
                links += '<div class="mt-auto pt-4"><a href="login.html" class="text-danger"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></div>';
                nav.innerHTML = links;
            }
        }
    });
</script>
</body>

</html>

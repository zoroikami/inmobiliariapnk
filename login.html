<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Iniciar sesión en Inmobiliaria PNK - Portal de propiedades de confianza.">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <title>Inmobiliaria PNK - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

<div class="container-fluid p-0 overflow-hidden" style="height: 100vh;">
    <div class="row g-0 h-100">
        <div class="col-lg-4 d-flex align-items-center justify-content-center bg-white p-5">
            <div class="w-100" style="max-width: 400px;">
                <div class="text-center mb-5">
                    <a href="index.html" class="text-decoration-none">
                        <div class="bg-success text-white p-3 rounded-circle d-inline-flex mb-3">
                            <i class="fas fa-home fa-2x"></i>
                        </div>
                        <h2 class="fw-bold text-success mb-0">INMOBILIARIA</h2>
                        <h4 class="text-warning fw-bold mb-0">PNK</h4>
                    </a>
                    <p class="text-muted mt-3">Ingresa tus credenciales para continuar.</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label fw-bold small text-uppercase text-muted">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="loginEmail" placeholder="tu@correo.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="loginPassword" class="form-label fw-bold small text-uppercase text-muted">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 border-end-0 ps-0" id="loginPassword" placeholder="••••••••" required>
                            <button type="button" class="input-group-text bg-light border-start-0" id="togglePassword" style="cursor:pointer;">
                                <i class="fas fa-eye text-muted"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label small text-muted" for="rememberMe">Recordarme</label>
                        </div>
                        <a href="recuperar.html" class="text-success text-decoration-none small fw-bold">¿Olvidaste tu clave?</a>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm">
                        <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
                    </button>

                    <div class="text-center mt-4">
                        <p class="text-muted small mb-2">Credenciales de prueba:</p>
                        <div class="d-flex flex-column gap-1">
                            <small class="text-muted"><strong>Admin:</strong> admin@pnk.cl / admin123</small>
                            <small class="text-muted"><strong>Gestor:</strong> pedro.s@pnk.cl / gestor123</small>
                            <small class="text-muted"><strong>Propietario:</strong> ana.m@gmail.com / prop123</small>
                        </div>
                    </div>
                </form>

                <div class="text-center mt-5 pt-3 border-top">
                    <p class="text-muted small">¿No tienes una cuenta aún?</p>
                    <div class="d-flex flex-column gap-2">
                        <a href="registro.html" class="btn btn-outline-success btn-sm rounded-pill fw-bold">Crear Cuenta (Gestor / Propietario)</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-8 d-none d-lg-block">
            <div style="height: 100vh; background: linear-gradient(rgba(16, 185, 129, 0.4), rgba(0,0,0,0.6)), url('img/hero.png'); background-size: cover; background-position: center;">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/utils.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestión de usuarios del sistema Inmobiliaria PNK.">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <title>Inmobiliaria PNK - Mantenedor Usuarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="d-flex">
    <aside class="sidebar">
        <div class="profile">
            <div class="avatar"><i class="fas fa-user-shield"></i></div>
            <h3>Administrador</h3>
            <p>admin@pnk.cl</p>
        </div>
        <nav>
            <a href="dashboard_admin.html"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="mantenedor_usuarios.html" class="active"><i class="fas fa-users"></i> Mantene. Usuarios</a>
            <a href="mantenedor_propiedades.html"><i class="fas fa-building"></i> Mantene. Propiedades</a>
            <div class="mt-auto pt-4">
                <a href="login.html" class="text-danger"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </div>
        </nav>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="d-flex justify-content-between align-items-center w-100">
                <div>
                    <h2>Mantenedor de Usuarios</h2>
                    <p class="text-muted mb-0">Gestión de roles y accesos — <span id="usuariosCount" class="fw-bold text-success">0 usuario(s)</span></p>
                </div>
                <a href="nuevo_usuario.html" class="btn btn-success rounded-pill px-4 fw-bold shadow-sm">
                    <i class="fas fa-user-plus me-2"></i> Nuevo Usuario
                </a>
            </div>
        </header>

        <!-- Barra de búsqueda -->
        <div class="mb-4">
            <div class="input-group" style="max-width: 400px;">
                <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                <input type="text" class="form-control" id="searchUsuarios" placeholder="Buscar por nombre, RUT, email o rol...">
            </div>
        </div>

        <div class="table-container animate__animated animate__fadeIn">
            <h3 class="mb-4">Lista de Usuarios</h3>
            <table>
                <thead>
                    <tr>
                        <th>Avatar</th>
                        <th>Nombre</th>
                        <th>RUT</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="usuariosTableBody">
                    <!-- Renderizado dinámicamente por JS -->
                </tbody>
            </table>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/utils.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/crud-usuarios.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        PNK.protectRoute(['admin']);
        PNK.showUserInfo();
        PNK.setupLogout();
    });
</script>
</body>
</html>
